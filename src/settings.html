{% set title = 'Settings' %}
{% set filename = 'settings.html' %}

{% extends 'src/layouts/master.html' %}

{% block content %}
<div class="page-heading">
    <h3 class="mb-4 fw-bold">Settings</h3>
</div>
<div class="page-content">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header">
            <h4>Admin Preferences</h4>
        </div>
        <div class="card-body">
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" role="switch" id="emailReports" checked>
                <label class="form-check-label" for="emailReports">Email weekly reports</label>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="studentAlerts" checked>
                <label class="form-check-label" for="studentAlerts">Student activity alerts</label>
            </div>
        </div>
    </div>
</div>
{% endblock %}
